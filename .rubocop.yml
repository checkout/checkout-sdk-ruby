AllCops:
  NewCops: enable

Metrics/AbcSize:
  Enabled: false

Lint/MissingSuper:
  Enabled: false

Lint/EmptyClass:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/ModuleLength:
  Max: 260

Metrics/MethodLength:
  Max: 25
  Exclude:
    # Aggregator that wires up every product client; grows with each new product.
    - "**/checkout_api.rb"

Metrics/ParameterLists:
  Max: 10

Metrics/ClassLength:
  Max: 120
  Exclude:
    # Endpoint-collection clients: one method per REST endpoint, grow with the API.
    - "**/issuing_client.rb"
    - "**/accounts_client.rb"

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 9

Style/Documentation:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Naming/AccessorMethodName:
  # The SDK consistently prefixes read endpoints with get_ to mirror the REST API
  # (e.g. get_cardholder, get_card_details). Zero-arg variants would otherwise flag.
  Enabled: false

Naming/MethodName:
  Exclude:
    - "**/google_pay_token_data*"
    - "**/sofort_source*"
    - "**/processing_settings*"